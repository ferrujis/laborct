apiVersion: apps/v1
kind: Deployment
metadata:
  name: fj-analytics-frontend
  namespace: fj-analytics
  labels:
    app: fj-analytics-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fj-analytics-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: fj-analytics-frontend
    spec:
      containers:
        - name: frontend
          image: fj-analytics/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: fj-analytics-frontend
  namespace: fj-analytics
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  selector:
    app: fj-analytics-frontend
