apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fj-analytics-ingress
  namespace: fj-analytics
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "15m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - analytics.yourdomain.com
      secretName: fj-analytics-tls
  rules:
    - host: analytics.yourdomain.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: fj-analytics-backend
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fj-analytics-frontend
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata:
  name: nginx
  controller: k8s.io/ingress-nginx
