apiVersion: apps/v1
kind: Deployment
metadata:
  name: fj-analytics-backend
  namespace: fj-analytics
  labels:
    app: fj-analytics-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fj-analytics-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: fj-analytics-backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
    spec:
      serviceAccountName: fj-analytics-backend
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: backend
          image: fj-analytics/backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: fj-analytics-config
            - secretRef:
                name: fj-analytics-secrets
          env:
            - name: NODE_ENV
              value: "production"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: database
              mountPath: /app/data
      volumes:
        - name: database
          persistentVolumeClaim:
            claimName: fj-analytics-db
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fj-analytics-backend
  namespace: fj-analytics
---
apiVersion: v1
kind: Service
metadata:
  name: fj-analytics-backend
  namespace: fj-analytics
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
  selector:
    app: fj-analytics-backend
