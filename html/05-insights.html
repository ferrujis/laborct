<div id="insights-view" style="display:none;">
    <nav class="tb" aria-label="Módulo InsightsAI">
      <button class="lgbtn btn-back" onclick="goHub()" type="button" aria-label="Voltar ao hub">⟵ Hub</button>
      <div class="tbl" style="color:var(--pink)" aria-hidden="true">Insights<span style="color:var(--tx2)">AI</span></div>
      <div class="tnav"></div>
      <div class="tbr">
        <span class="brl" id="brl-insights"></span>
        <button class="lgbtn" onclick="doLogout()" type="button" aria-label="Sair do sistema">Sair</button>
      </div>
    </nav>
    <div class="pg on">
      <div class="ptitle" style="color:var(--tx)">Análise <span style="color:var(--pink)">Executiva</span></div>
      <div class="psub">Motor analítico processando dados financeiros e operacionais em tempo real.</div>

      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap">
        <label for="insights-mes-select" style="font-size:11px;font-family:var(--font-mono);color:var(--tx3);text-transform:uppercase;letter-spacing:1.5px">Mês analisado</label>
        <select id="insights-mes-select" onchange="onInsightsMesChange()" style="background:var(--sf2);border:1px solid var(--bd);color:var(--tx);font-family:var(--font-mono);font-size:12px;padding:8px 12px;border-radius:var(--radius-sm);outline:none;cursor:pointer">
          <option value="">Automático (mês mais recente)</option>
        </select>

        <label style="font-size:11px;font-family:var(--font-mono);color:var(--tx3);text-transform:uppercase;letter-spacing:1.5px">Semana(s) analisada(s)</label>
        <div style="position:relative">
          <button id="insights-week-multibtn" type="button" onclick="toggleWeekDropdown()" disabled
            style="background:var(--sf2);border:1px solid var(--bd);color:var(--tx);font-family:var(--font-mono);font-size:12px;padding:8px 12px;border-radius:var(--radius-sm);cursor:pointer;min-width:180px;text-align:left;display:flex;justify-content:space-between;align-items:center;gap:10px">
            <span id="insights-week-multilabel">Todas as semanas</span><span style="font-size:9px;color:var(--tx3)">▾</span>
          </button>
          <div id="insights-week-dropdown" style="display:none;position:absolute;top:calc(100% + 4px);left:0;background:var(--sf2);border:1px solid var(--bd);border-radius:var(--radius-sm);z-index:50;min-width:180px;box-shadow:0 8px 24px rgba(0,0,0,.45);overflow:hidden"></div>
        </div>
      </div>

      <div class="ai-box">
        <div class="ai-header">
          <div class="ai-icon-wrap">🧠</div>
          <div>
            <div class="ai-title">Diagnóstico Gerencial</div>
            <div style="font-size:11px;color:var(--tx3);font-family:var(--font-mono);margin-top:3px;">Heuristic Engine v2.2 · com suporte a semanas</div>
          </div>
        </div>
        <div id="ai-content"><div class="nd">Aguardando dados...</div></div>
      </div>
    </div>
  </div>
